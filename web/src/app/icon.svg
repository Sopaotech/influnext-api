<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0D0820"/>
      <stop offset="100%" stop-color="#1a1040"/>
    </linearGradient>
    <linearGradient id="x-gradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#534AB7" />
      <stop offset="100%" stop-color="#C4BEFF" />
    </linearGradient>
    <filter id="x-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Fundo dark premium -->
  <rect width="64" height="64" rx="16" fill="url(#bg)"/>

  <!-- Símbolo X centralizado igual à logo -->
  <g filter="url(#x-glow)" transform="translate(14, 16)">
    <!-- Perna Secundária \ -->
    <line 
      x1="0" y1="0" 
      x2="32" y2="36" 
      stroke="url(#x-gradient)" 
      stroke-width="9" 
      stroke-linecap="butt" 
    />
    
    <!-- Perna Principal / -->
    <line 
      x1="-2" y1="36" 
      x2="38" y2="-6" 
      stroke="url(#x-gradient)" 
      stroke-width="9" 
      stroke-linecap="butt" 
    />
    
    <!-- Cabeça da Seta (Triângulo sólido) -->
    <polygon 
      points="26,-15 50,-18 43,6" 
      fill="#C4BEFF" 
    />
  </g>
</svg>
